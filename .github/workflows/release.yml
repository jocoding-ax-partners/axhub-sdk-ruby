name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: read
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # actions/checkout v5
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: ruby/setup-ruby@afeafc3d1ab54a631816aba4c914a0081c12ff2f # ruby/setup-ruby v1.310.0
        with:
          ruby-version: '3.3'
      - name: Verify tag commit is on main
        run: |
          git fetch origin main --depth=1
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main
      - name: Verify CI succeeded on tagged commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          count=$(gh run list --workflow ci.yml --commit "$GITHUB_SHA" --status success --json databaseId --jq 'length')
          [ "$count" -gt 0 ] || { echo "No successful ci.yml run found for $GITHUB_SHA"; exit 1; }
      - name: Verify release tag matches gem version
        run: |
          v=$(ruby -e "puts Gem::Specification.load('axhub-sdk.gemspec').version")
          [ "$GITHUB_REF_NAME" = "v$v" ] || { echo "tag != v$v"; exit 1; }
      - name: Test before publish
        run: ruby test/regression_test.rb && ruby test/conformance_test.rb && ruby test/operations_test.rb
      - name: Build gem before publish
        run: |
          mkdir -p dist
          gem build axhub-sdk.gemspec --output dist/axhub-sdk.gem
      - uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # actions/upload-artifact v5
        with:
          name: ruby-gem
          path: dist/*.gem
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: rubygems
    permissions:
      contents: read
      actions: read
      id-token: write
    steps:
      - uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # actions/download-artifact v5
        with:
          name: ruby-gem
          path: dist
      - uses: rubygems/configure-rubygems-credentials@bc6dd217f8a4f919d6835fcfefd470ef821f5c44 # rubygems/configure-rubygems-credentials v1.0.0
      - name: Push gem with trusted publisher credentials
        run: gem push dist/*.gem

  smoke:
    needs: publish
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: ruby/setup-ruby@afeafc3d1ab54a631816aba4c914a0081c12ff2f # ruby/setup-ruby v1.310.0
        with:
          ruby-version: '3.3'
      - name: Install and require published gem
        run: |
          set -eux
          version="$GITHUB_REF_NAME"
          version="${version#v}"
          for i in $(seq 1 10); do
            if gem install axhub-sdk -v "$version" --no-document; then
              break
            fi
            echo "RubyGems package not ready yet (attempt $i/10); retrying"
            sleep 30
          done
          ruby -e "require 'axhub_sdk'; puts AxHub::DEFAULT_BASE_URL"
