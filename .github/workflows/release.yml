name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: read
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # actions/checkout v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: ruby/setup-ruby@afeafc3d1ab54a631816aba4c914a0081c12ff2f # ruby/setup-ruby v1.310.0
        with:
          ruby-version: '3.3'
      - name: Verify tag commit is on main
        run: |
          git fetch origin main --depth=1
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main
      - name: Verify CI succeeded on tagged commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          count=$(gh run list --workflow ci.yml --commit "$GITHUB_SHA" --status success --json databaseId --jq 'length')
          [ "$count" -gt 0 ] || { echo "No successful ci.yml run found for $GITHUB_SHA"; exit 1; }
      - name: Verify release tag matches gem version
        run: |
          v=$(ruby -e "puts Gem::Specification.load('axhub-sdk.gemspec').version")
          [ "$GITHUB_REF_NAME" = "v$v" ] || { echo "tag != v$v"; exit 1; }
      - name: Test before publish
        run: ruby test/regression_test.rb && ruby test/conformance_test.rb && ruby test/operations_test.rb && ruby test/all_operations_e2e_test.rb
      - name: Build gem before publish
        run: |
          mkdir -p dist
          gem build axhub-sdk.gemspec --output dist/axhub-sdk.gem
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # actions/upload-artifact v7.0.1
        with:
          name: ruby-gem
          path: dist/*.gem
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: rubygems
    permissions:
      contents: read
      actions: read
      id-token: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # actions/download-artifact v8.0.1
        with:
          name: ruby-gem
          path: dist
      - uses: rubygems/configure-rubygems-credentials@762a4b77c3300434bb57c7ce80b20e36231927aa # rubygems/configure-rubygems-credentials v2.0.0
      - name: Push gem with trusted publisher credentials
        run: gem push dist/*.gem

  smoke:
    needs: publish
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: ruby/setup-ruby@afeafc3d1ab54a631816aba4c914a0081c12ff2f # ruby/setup-ruby v1.310.0
        with:
          ruby-version: '3.3'
      - name: Install and require published gem
        run: |
          set -eux
          version="$GITHUB_REF_NAME"
          version="${version#v}"
          for i in $(seq 1 10); do
            if gem install axhub-sdk -v "$version" --no-document; then
              break
            fi
            echo "RubyGems package not ready yet (attempt $i/10); retrying"
            sleep 30
          done
          ruby -e "require 'axhub_sdk'; puts AxHub::DEFAULT_BASE_URL"

  github_release:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # softprops/action-gh-release v3.0.0
        with:
          generate_release_notes: true
