name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  actions: read
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: rubygems
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # actions/checkout v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: ruby/setup-ruby@e5517072e87f198d9533967ae13d97c11b604005 # ruby/setup-ruby v1.99.0
        with:
          ruby-version: '3.3'
      - name: Verify tag commit is on main
        run: |
          git fetch origin main --depth=1
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main
      - name: Verify CI succeeded on tagged commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          count=$(gh run list --workflow ci.yml --commit "$GITHUB_SHA" --status success --json databaseId --jq 'length')
          [ "$count" -gt 0 ] || { echo "No successful ci.yml run found for $GITHUB_SHA"; exit 1; }
      - name: Verify release tag matches gem version
        run: |
          v=$(ruby -e "puts Gem::Specification.load('axhub-sdk.gemspec').version")
          [ "${{ github.ref_name }}" = "v$v" ] || { echo "tag != v$v"; exit 1; }
      - name: Test before publish
        run: ruby test/regression_test.rb && ruby test/conformance_test.rb && ruby test/operations_test.rb
      - name: Build gem before publish
        run: gem build axhub-sdk.gemspec
      - uses: rubygems/release-gem@6317d8d1f7e28c24d28f6eff169ea854948bd9f7 # rubygems/release-gem v1.2.0

  smoke:
    needs: publish
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: ruby/setup-ruby@e5517072e87f198d9533967ae13d97c11b604005 # ruby/setup-ruby v1.99.0
        with:
          ruby-version: '3.3'
      - name: Install and require published gem
        run: |
          set -eux
          version="${{ github.ref_name }}"
          version="${version#v}"
          for i in $(seq 1 10); do
            gem install axhub-sdk -v "$version" --no-document && break
            sleep 30
          done
          ruby -e "require 'axhub_sdk'; puts AxHub::DEFAULT_BASE_URL"
