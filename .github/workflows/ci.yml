name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (ruby ${{ matrix.ruby }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        ruby: ['3.1', '3.2', '3.3']
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # actions/checkout v4
      - uses: ruby/setup-ruby@e5517072e87f198d9533967ae13d97c11b604005 # ruby/setup-ruby v1.99.0
        with:
          ruby-version: ${{ matrix.ruby }}
      - name: Conformance (42 vectors) + route parity (177)
        run: ruby test/conformance_test.rb && ruby test/operations_test.rb && ruby test/regression_test.rb
      - run: gem build axhub-sdk.gemspec
