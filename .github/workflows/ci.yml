name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (ruby ${{ matrix.ruby }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        ruby: ['3.1', '3.2', '3.3']
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # actions/checkout v6.0.3
        with:
          persist-credentials: false
      - uses: ruby/setup-ruby@89f90524b88a01fe6e0b732220432cc6142926af # ruby/setup-ruby v1.313.0
        with:
          ruby-version: ${{ matrix.ruby }}
      - name: Conformance (42 vectors) + route parity (177)
        run: ruby test/conformance_test.rb && ruby test/operations_test.rb && ruby test/all_operations_e2e_test.rb && ruby test/regression_test.rb
      - run: gem build axhub-sdk.gemspec
