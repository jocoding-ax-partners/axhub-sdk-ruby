name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (ruby ${{ matrix.ruby }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        ruby: ['3.1', '3.2', '3.3']
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # actions/checkout v5
        with:
          persist-credentials: false
      - uses: ruby/setup-ruby@afeafc3d1ab54a631816aba4c914a0081c12ff2f # ruby/setup-ruby v1.310.0
        with:
          ruby-version: ${{ matrix.ruby }}
      - name: Conformance (42 vectors) + route parity (177)
        run: ruby test/conformance_test.rb && ruby test/operations_test.rb && ruby test/regression_test.rb
      - run: gem build axhub-sdk.gemspec
